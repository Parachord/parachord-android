<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Parachord JS Runtime</title>
</head>
<body>
<script>
    // ── Console polyfill ─────────────────────────────────────────────
    // Route JS console output to Android's Log via NativeBridge
    const _console = {
        log: (...args) => NativeBridge.log('debug', args.map(String).join(' ')),
        info: (...args) => NativeBridge.log('info', args.map(String).join(' ')),
        warn: (...args) => NativeBridge.log('warn', args.map(String).join(' ')),
        error: (...args) => NativeBridge.log('error', args.map(String).join(' ')),
        debug: (...args) => NativeBridge.log('debug', args.map(String).join(' ')),
    };
    window.console = _console;

    // ── Async Fetch polyfill ────────────────────────────────────────
    // Override window.fetch to use NativeBridge.fetchAsync() which runs
    // HTTP requests on a background thread and calls back via JS.
    // This frees the WebView JS thread so multiple .axe plugin searches
    // can run concurrently (Bandcamp, SoundCloud, etc.) instead of
    // blocking sequentially.
    window.__fetchCallbacks = {};
    var __fetchIdCounter = 0;

    window.fetch = function(url, options) {
        options = options || {};
        var method = (options.method || 'GET').toUpperCase();
        var headers = JSON.stringify(options.headers || {});
        var body = typeof options.body === 'string' ? options.body
                 : options.body ? JSON.stringify(options.body) : '';

        var callbackId = 'fetch_' + (++__fetchIdCounter);

        return new Promise(function(resolve, reject) {
            window.__fetchCallbacks[callbackId] = function(envelopeStr) {
                delete window.__fetchCallbacks[callbackId];
                try {
                    var parsed = JSON.parse(envelopeStr);
                    var responseBody = parsed.body || '';
                    resolve({
                        ok: parsed.ok,
                        status: parsed.status,
                        statusText: parsed.ok ? 'OK' : 'Error',
                        text: function() { return Promise.resolve(responseBody); },
                        json: function() {
                            try { return Promise.resolve(JSON.parse(responseBody)); }
                            catch (e) { return Promise.reject(new Error('Invalid JSON')); }
                        },
                        headers: new Headers(),
                    });
                } catch (e) {
                    reject(new Error('Failed to parse fetch response: ' + e.message));
                }
            };

            try {
                NativeBridge.fetchAsync(callbackId, url, method, headers, body);
            } catch (e) {
                delete window.__fetchCallbacks[callbackId];
                reject(e);
            }
        });
    };

    // Keep nativeFetch as an alias for backward compatibility
    window.nativeFetch = window.fetch;

    // ── Storage polyfill ─────────────────────────────────────────────
    // .axe plugins access config via nativeStorage. All keys are
    // namespaced under "plugin.<id>." by the resolver-loader before
    // reaching NativeBridge. Direct calls to NativeBridge.storageGet
    // with unprefixed keys are rejected by the Kotlin layer (security: C3).
    //
    // createPluginStorage(pluginId) returns a scoped {get, set} object
    // that automatically prefixes keys. The resolver-loader uses this
    // to give each plugin its own isolated storage namespace.
    window.createPluginStorage = function(pluginId) {
        var prefix = 'plugin.' + pluginId + '.';
        return {
            get: function(key) { return NativeBridge.storageGet(prefix + key); },
            set: function(key, value) { NativeBridge.storageSet(prefix + key, value); },
        };
    };
    // Global nativeStorage uses the "plugin._global." namespace for
    // backward compatibility with any .axe that calls it directly.
    // It can NOT access app-level keys (tokens, credentials).
    window.nativeStorage = {
        get: function(key) { return NativeBridge.storageGet('plugin._global.' + key); },
        set: function(key, value) { NativeBridge.storageSet('plugin._global.' + key, value); },
    };

    console.log('Parachord JS runtime: polyfills loaded');
</script>

<!-- Load the resolver-loader.js from desktop (unchanged) -->
<script src="resolver-loader.js"></script>

<script>
    // Create global ResolverLoader instance for PluginManager to use
    if (typeof ResolverLoader !== 'undefined') {
        window.__resolverLoader = new ResolverLoader();
        console.log('Parachord JS runtime: ResolverLoader ready');
    } else {
        console.error('ResolverLoader class not found — resolver-loader.js failed to load');
    }
</script>
</body>
</html>
